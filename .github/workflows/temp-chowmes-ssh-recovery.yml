name: TEMP Chowmes SSH Recovery

on:
  workflow_dispatch:
    inputs:
      mac_ipv4:
        description: "Mac public IPv4 to unban from SSH protection"
        required: true
        type: string

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Prepare SSH key
        env:
          CHOWMES_SSH_KEY: ${{ secrets.TEMP_CHOWMES_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$CHOWMES_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$CHOWMES_SSH_KEY" > ~/.ssh/chowmes_ed25519
          chmod 600 ~/.ssh/chowmes_ed25519

      - name: Inspect and clear SSH ban
        env:
          MAC_IPV4: ${{ inputs.mac_ipv4 }}
        run: |
          set -euo pipefail
          test -n "$MAC_IPV4"
          ssh -i ~/.ssh/chowmes_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=25 \
            chowmesadmin@72.61.72.147 \
            "MAC_IPV4='$MAC_IPV4' bash -s" <<'REMOTE'
          set -euo pipefail
          echo "connected=yes"
          hostname
          id
          echo "ssh_service=$(systemctl is-active ssh || true)"
          echo "sshd_listen=$(sudo ss -ltnp | grep -E ':(22)\\s' || true)"
          if command -v fail2ban-client >/dev/null 2>&1; then
            echo "== fail2ban sshd status before =="
            sudo fail2ban-client status sshd || true
            echo "== fail2ban sshd ban list before =="
            sudo fail2ban-client get sshd banip || true
            echo "== unban target =="
            sudo fail2ban-client set sshd unbanip "$MAC_IPV4" || true
            echo "== fail2ban sshd ban list after =="
            sudo fail2ban-client get sshd banip || true
          else
            echo "fail2ban=missing"
          fi
          echo "== ufw status =="
          sudo ufw status numbered || true
          REMOTE
